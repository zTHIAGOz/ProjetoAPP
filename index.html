<!DOCTYPE html>
<html lang = "pt-br">
<head>
	<style>
		body{

			font-family: Arial, sans-serif;
			background-color: black;
			color: white;
			margin: 0;
			padding: 0;
		}
		.container{
			width: 500px;
			margin: 50px auto;
			background: black;
			padding: 30px;
			border-radius: 0 0 20px black;

		}

		h1 {
			margin-top: 25px;
			font-size: 18px;
			color: gray;

		}

		h2{
			text-align: center;
			margin-bottom: 25px;
		}

		input {
			width: 72%;
			padding: 12px;
			border: none;
			border-radius: 8px;
			outline: none;
			font-size: 15px;
		}

		button{
			padding: 12px;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			margin-left: 5px;
			font-weight: bold;
		}

		button:hover{
			opacity: 0.85;
		}

		ul{
			list-style: none;
			padding: 0;
		}

		li{
			background: black;
			margin-top: 8px;
			padding: 12px;
			border-radius: 8px;
		}

		.concluida{
			text-decoration: line-through;
			color: gray;
		}

	</style>
	<meta charset = "UTF-8">
	<title>To Do List</title>
	<style>
		.concluida{
			text-decoration : line-through;
			color: gray;
		}
	</style>
</head>

<body>
	<div class = "container"> /* cria uma caixa que vai envoler tudo, usada pra centralizar e estilizar */

	<h1> Minha Lista de Tarefas </h1> 
	
	<input type = "text" id= "inputTarefa" placeholder = "Digite uma tarefa"> 
	/* coloca a caixa de texto pra escrever a tarefa com a mensagem em cinza dentro */
	<button onclick = "adicionarTarefa()"> Adicionar </button>
	/*cria o botao que chama a função js*/
	
	<h2>Pendentes</h2>
	<ul id = "listaPendentes"></ul>

	<h2>Concluída</h2>
	<ul id = "listaConcluidas"></ul>

	<ul id = "listaTarefas"></ul>
		</div>
	
	<script src = "script.js"></script>
	
	</body>

	
</html>
